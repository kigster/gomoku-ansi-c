# haproxy.cfg - Auto-generated from iac/templates/haproxy.cfg.sh
# Primary backend: Gomoku cluster (local development)
#
# Start with: haproxy -f haproxy.cfg -D

global
    log stdout format raw local0
    maxconn 4096
    stats socket /var/run/haproxy.sock mode 660 level admin
    daemon

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor except 127.0.0.0/8
    option redispatch
    retries 3
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout queue 600s
    default-server inter 2s fall 2 rise 1

# =========================================================================
# Frontend - receives requests from nginx on localhost
# =========================================================================
frontend gomoku_frontend
    bind 127.0.0.1:10000
    default_backend gomoku_primary

# =========================================================================
# Primary Backend - Gomoku cluster
# Uses agent-check for accurate busy/ready status
# =========================================================================
backend gomoku_primary
    balance leastconn
    timeout server 600000ms

    server gomoku-1 127.0.0.1:9500 check agent-check agent-port 9600 agent-inter 1s weight 100
    server gomoku-2 127.0.0.1:9501 check agent-check agent-port 9601 agent-inter 1s weight 100
    server gomoku-3 127.0.0.1:9502 check agent-check agent-port 9602 agent-inter 1s weight 100
    server gomoku-4 127.0.0.1:9503 check agent-check agent-port 9603 agent-inter 1s weight 100
    server gomoku-5 127.0.0.1:9504 check agent-check agent-port 9604 agent-inter 1s weight 100
    server gomoku-6 127.0.0.1:9505 check agent-check agent-port 9605 agent-inter 1s weight 100
    server gomoku-7 127.0.0.1:9506 check agent-check agent-port 9606 agent-inter 1s weight 100
    server gomoku-8 127.0.0.1:9507 check agent-check agent-port 9607 agent-inter 1s weight 100
    server gomoku-9 127.0.0.1:9508 check agent-check agent-port 9608 agent-inter 1s weight 100
    server gomoku-10 127.0.0.1:9509 check agent-check agent-port 9609 agent-inter 1s weight 100
    server gomoku-11 127.0.0.1:9510 check agent-check agent-port 9610 agent-inter 1s weight 100
    server gomoku-12 127.0.0.1:9511 check agent-check agent-port 9611 agent-inter 1s weight 100
    server gomoku-13 127.0.0.1:9512 check agent-check agent-port 9612 agent-inter 1s weight 100
    server gomoku-14 127.0.0.1:9513 check agent-check agent-port 9613 agent-inter 1s weight 100
    server gomoku-15 127.0.0.1:9514 check agent-check agent-port 9614 agent-inter 1s weight 100
    server gomoku-16 127.0.0.1:9515 check agent-check agent-port 9615 agent-inter 1s weight 100

# =========================================================================
# Statistics page (optional, for monitoring)
# =========================================================================
frontend stats
    bind 127.0.0.1:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 1s
    stats admin if LOCALHOST
