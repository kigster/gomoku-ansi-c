name: API Lint

on:
  push:
    branches: ['**']
    paths: ['api/**']
  pull_request:
    branches: [main]
    paths: ['api/**']

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff
        run: uv run ruff check app/ tests/
