name: CI Ruby Validation

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

jobs:
  validate-schema:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - uses: actions/setup-ruby@v1
      with:
        ruby-version: '4.0.2'

    - name: Bundle Install
      run: bundle install -j 4

    - name: Validate sample game against JSON schema
      run: |
        make validate-json
