name: C99 Test Suite

on:
  push:
    branches: [ '**' ]
    paths: ['gomoku-c/**']
  pull_request:
    branches: [ main ]
    paths: ['gomoku-c/**']

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    defaults:
      run:
        working-directory: gomoku-c

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc g++ make cmake
      working-directory: .

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install gcc make cmake
      working-directory: .

    - name: Build Google Test
      run: |
        make googletest

    - name: Verify Google Test libraries
      run: |
        ls -la tests/googletest/build/lib/
        file tests/googletest/build/lib/libgtest.a
        file tests/googletest/build/lib/libgtest_main.a

    - name: Build project
      run: |
        make -j 4 all

    - name: Run tests
      run: |
        make tests

    - name: Test binary execution
      run: |
        ./bin/gomoku --help
        timeout 5s ./bin/gomoku --level easy --board 15 || true
        echo "Binary execution test completed"

    - name: Check for memory leaks (Ubuntu only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get install -y valgrind
        valgrind --leak-check=summary --error-exitcode=1 ./bin/test_gomoku || echo "Memory check completed"
      working-directory: gomoku-c
